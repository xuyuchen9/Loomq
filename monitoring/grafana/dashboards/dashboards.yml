# Grafana dashboard provider configuration
# Version: 0.4.5

apiVersion: 1

providers:
  - name: 'LoomQ Dashboards'
    orgId: 1
    folder: 'LoomQ'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
